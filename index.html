<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI 每日资讯</title>
    <link rel="stylesheet" href="/web/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">AI News Digest</p>
        <h1>AI 每日资讯</h1>
      </div>
      <div class="meta">
        <span id="generatedAt">正在读取...</span>
        <a href="/data/news.json" target="_blank" rel="noreferrer">JSON</a>
      </div>
    </header>

    <main>
      <section class="controls" aria-label="筛选新闻">
        <div class="search">
          <span aria-hidden="true">⌕</span>
          <input id="searchInput" type="search" placeholder="搜索标题、摘要、来源或标签">
        </div>
        <div class="segments" role="tablist" aria-label="新闻类型">
          <button class="active" data-filter="all" type="button">全部</button>
          <button data-filter="official" type="button">官方</button>
          <button data-filter="research" type="button">研究</button>
          <button data-filter="media" type="button">媒体</button>
          <button data-filter="zh" type="button">中文</button>
          <button data-filter="en" type="button">英文</button>
        </div>
      </section>

      <section class="summary" aria-label="抓取概况">
        <div>
          <strong id="totalCount">0</strong>
          <span>条资讯</span>
        </div>
        <div>
          <strong id="sourceCount">0</strong>
          <span>个来源</span>
        </div>
        <div>
          <strong id="windowDays">0</strong>
          <span>天窗口</span>
        </div>
      </section>

      <section id="statusList" class="status-list" aria-label="来源状态"></section>
      <section id="newsList" class="news-list" aria-label="新闻列表"></section>
      <p id="emptyState" class="empty" hidden>没有匹配的资讯。</p>
    </main>

    <script src="/web/app.js" type="module"></script>
  </body>
</html>
